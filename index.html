<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos No Atendidos · DIRESA Callao</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-brand">💊 PRODUCTOS NO ATENDIDOS</span>
  <div class="topbar-sep"></div>
  <span class="topbar-meta" id="tb-meta">Cargando datos…</span>
  <div class="topbar-right">
    <div class="pill-live"><div class="live-dot"></div>EN VIVO</div>
    <button class="btn-sm" onclick="reloadData()">↺ Actualizar</button>
  </div>
</div>

<!-- PERIOD TABS -->
<div class="period-nav" id="period-nav">
  <button class="nav-refresh" id="refresh-btn" onclick="reloadData()" title="Recargar datos">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0018.49 15"/>
    </svg>
    Actualizar
  </button>
</div>

<!-- BANNER -->
<div id="global-banner" style="display:none"></div>

<!-- CONTENIDO -->
<div id="dash-content">
  <div class="loading-overlay">
    <div class="loader"></div>
    <div class="loading-text">Conectando con Google Sheets…</div>
  </div>
</div>

<div class="footer" id="footer-txt"></div>

<script src="script.js"></script>
</body>
</html>
